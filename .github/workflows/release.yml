name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  validate:
    name: Validate Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag is on main branch
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Tag must point to a commit on the main branch"
            exit 1
          fi
          echo "Tag is on main"

      - name: Extract version from tag
        id: extract
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "Tag version: $TAG"

      - name: Verify package.json version matches tag
        run: |
          TAG="${{ steps.extract.outputs.version }}"
          PKG_VERSION=$(node -e "console.log(require('./package.json').version)")
          if [[ "$PKG_VERSION" != "$TAG" ]]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag (v$TAG)"
            exit 1
          fi
          echo "package.json: $PKG_VERSION"

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish to npm (skip if already published)
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          if npm view "tauri-agent-tools@$VERSION" version 2>/dev/null; then
            echo "Version $VERSION already published, skipping"
          else
            npm publish
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate, publish]

    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          if [[ -f CHANGELOG.md ]]; then
            SECTION=$(sed -n "/^## .*${VERSION}/,/^## /p" CHANGELOG.md | head -n -1)
            if [[ -n "$SECTION" ]]; then
              echo "body<<EOF" >> "$GITHUB_OUTPUT"
              echo "$SECTION" >> "$GITHUB_OUTPUT"
              echo "EOF" >> "$GITHUB_OUTPUT"
            else
              echo "body=Release v${VERSION}" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "body=Release v${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ needs.validate.outputs.version }}
          body: |
            ${{ steps.changelog.outputs.body }}

            ## Install

            ```
            npm i -g tauri-agent-tools
            ```
